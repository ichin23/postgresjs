<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body data-bs-theme="dark">
    <header>
      <h1>Gerenciamento de Pessoas</h1>
    </header>

    <main>
      <section id="listagem">
        <h3>Listagem</h3>
        <table class="table table-stripped">
          <thead>
            <th>Nome</th>
            <th>CPF</th>
            <th>Data Nascimento</th>
            <th>Nº Cartão</th>
            <th>Validade</th>
            <th>Nº CVV</th>
            <th>Ações</th>
          </thead>
          <tbody>
            <template>
              <tr>
                <td>Pedro Manoel</td>
                <td>019.161.246.40</td>
                <td>01/03/2005</td>
                <td>4444 4444 4444 4444</td>
                <td>02/2030</td>
                <td>234</td>
                <td>
                  <button class="">Editar</button>
                  <button>Deletar</button>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </section>

      <div class="resizeBar"></div>

      <section id="adicionar">
        <h3>Adicionar Pessoas</h3>
        <form class="addForm">
          <fieldset>
            <legend>Informações Pessoais</legend>
            <div class="inputCont">
              <label for="nameInp">Nome</label>
              <input type="text" name="name" id="nameInp" />
            </div>
          
            <div class="inputCont">
              <label for="cpfInp">CPF</label>
              <input type="text" name="cpf" id="cpfInp" />
            </div>
          
            <div class="inputCont">
              <label for="rgInp">RG</label>
              <input type="text" name="rg" id="rgInp" />
            </div>
        
            <div class="inputCont">
              <label for="birthdayInp">Data de aniversário</label>
              <input type="date" name="birthday" id="birthdayInp" />
            </div>
          
            <div class="inputCont">
              <label for="celInp">Celular</label>
              <input type="text" name="telefone" id="celInp" />
            </div>
          </fieldset>
          <fieldset>
            <legend>Cartão</legend>
            <div class="inputCont">
              <label for="numCartaoInp">Nº Cartão</label>
              <input type="number" name="numCartao" id="numCartaoInp">
            </div>

            <div class="inputCont">
              <label for="vencInp">Vencimento Cartão</label>
              <input type="month" name="dataCartao" id="vencInp">
            </div>

            <div class="inputCont">
              <label for="cvvInp">CVV</label>
              <input type="number" name="cvvCartao" id="cvvInp">
            </div>
          </fieldset>
          <button>Salvar</button>
        </form>
      </section>
    </main>

    <script src="js/script.js"></script>
    <script type="module" src="js/listagemPeople.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
