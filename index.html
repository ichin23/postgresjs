    <section id="listagem"></section>

    <section id="adicionar">
      <h3>Adicionar Pessoas</h3>

        <fieldset>
          <label for="nameInp">Nome</label>
          <input type="text" id="nameInp" />
        </fieldset>
        <fieldset>
          <label for="cpfInp">CPF</label>
          <input type="text" id="cpfInp" />
        </fieldset>
        <fieldset>
          <label for="rgInp">RG</label>
          <input type="text" id="rgInp" />
        </fieldset>
        <fieldset>
          <label for="birthdayInp">Data de aniversário</label>
          <input type="date" id="birthdayInp" />
        </fieldset>
        <fieldset>
          <label for="celInp">Celular</label>
          <input type="text" id="celInp" />
        </fieldset>
        <fieldset>
          <label for=""></label>
        </fieldset>

    </section>
